# Keep the Railway worker warm so the vendor-embedded
# <script src=".../taxscan-push.js" defer> tag never hits a cold start at
# page time. The README's "Reliable SDK delivery" section explains why.
#
# Cron events only fire on the default branch (main), so this workflow
# must be present there to actually run on schedule.

name: Warm Railway worker

on:
  schedule:
    # */5 — GitHub may delay scheduled runs by 10–15 min under load, which is
    # fine: even one ping per 15 min is more than enough to outpace Railway's
    # idle-out window.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: curl /healthz with 3 retries
        run: |
          set -u
          URL="https://taxscan-push-production.up.railway.app/healthz"
          for attempt in 1 2 3; do
            # A cold worker can take up to ~30 s to come back; allow for that.
            if curl -fsS --max-time 35 "$URL" -o /tmp/body -w 'http=%{http_code} dur=%{time_total}s\n'; then
              cat /tmp/body
              echo
              echo "ok on attempt $attempt"
              exit 0
            fi
            echo "attempt $attempt failed"
            sleep 5
          done
          echo "all 3 attempts failed — Railway may be down"
          exit 1
